services:
    engine:
        build:
            context: .
            dockerfile: Dockerfile.dev
        stdin_open: true
        tty: true
        ports:
            - "8080:8080"
            - "8081:8081"
            - "9000:9000"
        ulimits:
            nofile:
                soft: 65536
                hard: 65536
        volumes:
            - .:/app
